<!doctype html>
<!--
  OGP 画像(public/ogp.png)の生成用ページ。
  サイトの ParticleField と同じ「文字をドットに変換」する描画を 1200x630 で行う。

  再生成方法(macOS):
    "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" \
      --headless=new --disable-gpu --hide-scrollbars \
      --window-size=1200,630 --virtual-time-budget=8000 \
      --screenshot=public/ogp.png "file://$(pwd)/scripts/ogp.html"
-->
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@700&family=Geist+Mono:wght@500&display=swap"
      rel="stylesheet"
    />
    <style>
      html,
      body {
        margin: 0;
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas" width="1200" height="630"></canvas>
    <script>
      const W = 1200;
      const H = 630;
      const BG = "#0b0e14";
      const ACCENT = { r: 255, g: 0, b: 64 }; // #ff0040
      const ACCENT_2 = { r: 124, g: 58, b: 237 }; // #7c3aed
      const MUTED = "#8b95a7";

      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      // 乱数を固定して再生成のたびに絵柄が変わらないようにする
      let seed = 42;
      const rand = () => {
        seed = (seed * 1664525 + 1013904223) % 4294967296;
        return seed / 4294967296;
      };

      const draw = () => {
        // 1) 透明なキャンバスに文字だけ描いてドット座標を抽出する
        //    (背景を塗ってからだと全ピクセルが不透明になり判定できない)
        const text = "t4kamuna";
        ctx.font = "700 100px Geist, sans-serif";
        const measured = ctx.measureText(text).width || 1;
        const fontSize = ((W * 0.78) / measured) * 100;
        ctx.font = `700 ${fontSize}px Geist, sans-serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "#fff";
        const textY = H / 2 - 30;
        ctx.fillText(text, W / 2, textY);

        const image = ctx.getImageData(0, 0, W, H);

        // 2) 背景と微光粒子を描く
        ctx.clearRect(0, 0, W, H);
        ctx.fillStyle = BG;
        ctx.fillRect(0, 0, W, H);
        for (let i = 0; i < 90; i++) {
          ctx.globalAlpha = 0.06 + rand() * 0.22;
          ctx.fillStyle = "#e2e8f0";
          ctx.fillRect(rand() * W, rand() * H, 1.5, 1.5);
        }
        ctx.globalAlpha = 1;

        // 3) 抽出した座標に赤→紫グラデーションのドットを打つ
        const gap = 6;
        const dots = [];
        let minX = Infinity;
        let maxX = -Infinity;
        for (let y = 0; y < H; y += gap) {
          for (let x = 0; x < W; x += gap) {
            if (image.data[(y * W + x) * 4 + 3] > 128) {
              dots.push({ x, y });
              if (x < minX) minX = x;
              if (x > maxX) maxX = x;
            }
          }
        }
        for (const dot of dots) {
          const t = maxX > minX ? (dot.x - minX) / (maxX - minX) : 0;
          const r = Math.round(ACCENT.r + (ACCENT_2.r - ACCENT.r) * t);
          const g = Math.round(ACCENT.g + (ACCENT_2.g - ACCENT.g) * t);
          const b = Math.round(ACCENT.b + (ACCENT_2.b - ACCENT.b) * t);
          ctx.fillStyle = `rgb(${r} ${g} ${b})`;
          ctx.fillRect(dot.x, dot.y, 2.5, 2.5);
        }

        // 肩書き(タイプ演出のカーソル付き)
        const role = "STUDENT PROGRAMMER";
        ctx.font = "500 30px 'Geist Mono', monospace";
        ctx.fillStyle = MUTED;
        ctx.textAlign = "center";
        const spaced = role.split("").join("  ");
        const roleY = textY + fontSize * 0.62 + 60;
        ctx.fillText(spaced, W / 2, roleY);
        const roleWidth = ctx.measureText(spaced).width;
        ctx.fillStyle = "#ff0040";
        ctx.fillRect(W / 2 + roleWidth / 2 + 16, roleY - 14, 14, 28);
      };

      document.fonts.ready.then(draw);
    </script>
  </body>
</html>
